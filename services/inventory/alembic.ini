# =============================================================================
# Alembic Configuration — Inventory Service
# =============================================================================
# The `sqlalchemy.url` below is a placeholder; the actual URL is injected
# at runtime from environment variables in alembic/env.py.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os    # use OS separator for version paths

# Placeholder — overridden in env.py via Settings.sync_database_url
sqlalchemy.url = mysql+pymysql://inventory_user:inventory_password@127.0.0.1/inventory_db?charset=utf8mb4

[post_write_hooks]
# Optional: run black on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
