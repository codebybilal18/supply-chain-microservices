# =============================================================================
# SupplyChainForge — Docker Compose (Local Development)
# =============================================================================
# Services:
#   mysql       — MySQL 8.0 (shared DB server, per-service databases)
#   redis       — Redis 7 (cache layer)
#   inventory   — Inventory microservice (Port 8001)
#   order       — Order microservice (Port 8002)
#   fulfillment — Fulfillment microservice (Port 8003)
#
# Ports (host:container):
#   3306:3306   MySQL
#   6379:6379   Redis
#   8001:8000   Inventory Service
#   8002:8001   Order Service
#   8003:8002   Fulfillment Service
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up inventory --build # start only inventory + its deps
#   docker compose down -v             # stop and remove volumes
# =============================================================================

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: scf-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - scf-network

  redis:
    image: redis:7-alpine
    container_name: scf-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scf-network

  # ── Microservices ────────────────────────────────────────────────────────────

  inventory:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
      target: runtime
    container_name: scf-inventory
    restart: unless-stopped
    env_file:
      - ./services/inventory/.env.example
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: inventory_db
      DB_USER: inventory_user
      DB_PASSWORD: inventory_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${INVENTORY_SERVICE_PORT:-8001}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scf-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  order:
    build:
      context: ./services/order
      dockerfile: Dockerfile
      target: runtime
    container_name: scf-order
    restart: unless-stopped
    env_file:
      - ./services/order/.env.example
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: order_db
      DB_USER: order_user
      DB_PASSWORD: order_password
      INVENTORY_SERVICE_URL: http://inventory:8000
    ports:
      - "${ORDER_SERVICE_PORT:-8002}:8001"
    depends_on:
      mysql:
        condition: service_healthy
      inventory:
        condition: service_healthy
    networks:
      - scf-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  fulfillment:
    build:
      context: ./services/fulfillment
      dockerfile: Dockerfile
      target: runtime
    container_name: scf-fulfillment
    restart: unless-stopped
    env_file:
      - ./services/fulfillment/.env.example
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: fulfillment_db
      DB_USER: fulfillment_user
      DB_PASSWORD: fulfillment_password
      ORDER_SERVICE_URL: http://order:8001
    ports:
      - "${FULFILLMENT_SERVICE_PORT:-8003}:8002"
    depends_on:
      mysql:
        condition: service_healthy
      order:
        condition: service_healthy
    networks:
      - scf-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  mysql_data:
    name: scf-mysql-data
  redis_data:
    name: scf-redis-data

networks:
  scf-network:
    name: scf-network
    driver: bridge
